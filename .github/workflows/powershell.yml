name: PowerShell Validation

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify PowerShell Version
        run: pwsh --version

      - name: Validate PowerShell Script
        run: |
          Write-Host "Listing PowerShell scripts..."
          Get-ChildItem *.ps1
