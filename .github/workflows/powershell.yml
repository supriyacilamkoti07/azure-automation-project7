name: PowerShell Validation

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify PowerShell Version
        shell: pwsh
        run: |
          $PSVersionTable.PSVersion

      - name: Validate PowerShell Script
        shell: pwsh
        run: |
          Write-Host "Listing PowerShell scripts..."
          Get-ChildItem *.ps1
